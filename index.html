<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéGB | Principal Build</title>
    <style>
        body {
            background: #1a1a1a;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 10px; color: #ffcb05; text-shadow: 2px 2px #3b4cca; }
        
        /* THE CANVAS: Pixel-perfect upscaling via CSS */
        canvas {
            background: #000;
            width: 640px;  /* 160 * 4 */
            height: 576px; /* 144 * 4 */
            image-rendering: pixelated; /* Keeps it sharp! */
            border: 8px solid #333;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 640px;
        }
        .btn {
            padding: 10px 20px;
            background: #3b4cca;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }
        .btn:hover { background: #2a3a9a; }
        .info { font-size: 0.8em; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>PokéGB WASM</h1>
    <canvas id="screen" width="160" height="144"></canvas>

    <div class="controls">
        <input type="file" id="rom-upload" accept=".gb" hidden>
        <button class="btn" onclick="document.getElementById('rom-upload').click()">Upload ROM</button>
        <button class="btn" onclick="downloadSave()">Download .SAV</button>
    </div>

    <div class="info">
        Controls: Z (A) | X (B) | Enter (Start) | S (Select) | Arrows (Move)
    </div>

    <script type="module">
        // Import the WASM glue generated by wasm-pack
        import init, { EmulatorState } from './pkg/pokegameboy.js';

        let emu;
        let wasm_mem;
        let dpad = 0x0F;
        let buttons = 0x0F;

        async function run() {
            // 1. Initialize WASM module
            const wasm = await init();
            wasm_mem = wasm.memory;

            // 2. Try to auto-load rom.gb if it exists on the server
            try {
                const response = await fetch('rom.gb');
                if (response.ok) {
                    const buffer = await response.arrayBuffer();
                    startEmulator(new Uint8Array(buffer));
                }
            } catch (e) {
                console.log("No rom.gb found on server. Please upload manually.");
            }

            // Handle Manual Upload
            document.getElementById('rom-upload').onchange = async (e) => {
                const file = e.target.files[0];
                const buffer = await file.arrayBuffer();
                startEmulator(new Uint8Array(buffer));
            };
        }

        function startEmulator(romBytes) {
            emu = new EmulatorState(romBytes);
            
            const canvas = document.getElementById('screen');
            const ctx = canvas.getContext('2d');
            
            function frame() {
                emu.tick_frame(); // Execute 70,224 cycles
                
                // Direct memory access for performance
                const ptr = emu.framebuffer_ptr();
                const pixels = new Uint8ClampedArray(wasm_mem.buffer, ptr, 160 * 144 * 4);
                
                const imageData = new ImageData(pixels, 160, 144);
                ctx.putImageData(imageData, 0, 0);
                
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        // --- INPUT MAPPING ---
        window.onkeydown = (e) => updateKeys(e, false);
        window.onkeyup = (e) => updateKeys(e, true);

        function updateKeys(e, isUp) {
            const key = e.key.toLowerCase();
            
            if (key === "arrowdown")  isUp ? dpad |= 0x08 : dpad &= ~0x08;
            if (key === "arrowup")    isUp ? dpad |= 0x04 : dpad &= ~0x04;
            if (key === "arrowleft")  isUp ? dpad |= 0x02 : dpad &= ~0x02;
            if (key === "arrowright") isUp ? dpad |= 0x01 : dpad &= ~0x01;
            
            if (key === "enter") isUp ? buttons |= 0x08 : buttons &= ~0x08;
            if (key === "s")     isUp ? buttons |= 0x04 : buttons &= ~0x04;
            if (key === "x")     isUp ? buttons |= 0x02 : buttons &= ~0x02;
            if (key === "z")     isUp ? buttons |= 0x01 : buttons &= ~0x01;

            if (emu) emu.update_joypad(dpad, buttons);
            
            // Prevent scrolling with arrows
            if (["arrowup","arrowdown","arrowleft","arrowright"].includes(key)) {
                e.preventDefault();
            }
        }

        // --- SAVE SYSTEM ---
        window.downloadSave = () => {
            if (!emu) return;
            const saveData = emu.save();
            const blob = new Blob([saveData], {type: "application/octet-stream"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "pokemon.sav";
            a.click();
        };

        run();
    </script>
</body>
</html>
