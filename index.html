<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦀 Rust Gameboy LR35902 Runtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: radial-gradient(circle at top left, #ffffff, #e2e8f0);
            --glass-bg: rgba(255, 255, 255, 0.94);
            --accent: #f9612e; /* Rust Orange */
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --btn-gray: #2c2c2e;
        }

        body { 
            background: var(--bg);
            color: var(--text-main); 
            display: flex;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        .console-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            padding: 24px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 600px;
        }

        .header-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        h1 { 
            font-size: 1.1rem;
            font-weight: 800; 
            margin: 0; 
            letter-spacing: -0.5px;
            text-transform: uppercase;
            font-style: italic;
            background: linear-gradient(to right, #1d1d1f, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #status-label { 
            font-size: 9px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- COMPACT SYSTEM MONITOR --- */
        .system-monitor {
            background: var(--btn-gray);
            color: #d1d1d6;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-radius: 12px 12px 0 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .mon-label { color: #86868b; }
        .mon-value { color: #ffffff; }
        .monitor-divider { color: #48484a; }
        
        /* --- SCREEN --- */
        .screen-container {
            background: #000;
            border-radius: 14px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.2);
            line-height: 0;
        }

        canvas { 
            width: 560px; /* Scaled to 3.5x */
            height: 504px; 
            image-rendering: pixelated; 
            background: #000;
            display: block;
        }

        /* --- CONTROLS --- */
        .mobile-controls {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 15px;
            margin-top: 10px;
            align-items: center;
        }

        .dpad { display: grid; grid-template-areas: ". up ." "left center right" ". down ."; gap: 6px; }
        .btn-action-group { display: flex; gap: 12px; }
        .menu-btns { display: flex; flex-direction: column; gap: 8px; }

        .ctrl-btn {
            background: var(--btn-gray);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            touch-action: manipulation;
            box-shadow: 0 4px 0 #000;
            cursor: pointer;
            user-select: none;
        }

        .square { width: 50px; height: 50px; border-radius: 10px; font-size: 18px; }
        .round { width: 56px; height: 56px; border-radius: 50%; font-size: 20px; }
        .slim { width: 58px; height: 22px; border-radius: 20px; font-size: 8px; box-shadow: 0 2px 0 #000; }

        .ctrl-btn:active { background: var(--accent); transform: translateY(2px); box-shadow: 0 1px 0 #000; }

        .up { grid-area: up; } .down { grid-area: down; }
        .left { grid-area: left; } .right { grid-area: right; }

        /* --- BUTTON TOOLBAR --- */
        .button-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px;}
        button {
            background: #1d1d1f; color: #fff; border: none;
            padding: 8px 12px; border-radius: 8px; cursor: pointer;
            font-weight: 700; font-size: 10px; text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace;
        }
        .btn-sec { background: transparent; color: var(--text-main); border: 1px solid #d1d1d6; }
        .btn-accent { background: var(--accent); }

        @media (max-width: 600px) {
            .console-card { width: 98vw; padding: 12px; }
            canvas { width: 100%; height: auto; }
            .square { width: 44px; height: 44px; }
            .round { width: 50px; height: 50px; }
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="console-card">
        <div class="header-meta">
            <h1>🦀 Gameboy LR35902 Runtime </h1>
            <div id="status-label">Runtime Ready</div>
        </div>

        <div class="screen-container">
            <div class="system-monitor" id="debug-info">
                <div class="monitor-group"><span class="mon-label">CPU:</span> <span class="mon-value" id="reg-pc">0000</span></div>
                <div class="monitor-divider">|</div>
                <div class="monitor-group">
                    <span class="mon-label">LY:</span> <span class="mon-value" id="reg-ly">00</span>
                    <span class="mon-label">IF:</span> <span class="mon-value" id="reg-if">00</span>
                </div>
                <div class="monitor-divider">|</div>
                <div class="monitor-group" style="color: #34c759;"><span>RUNNING</span></div>
            </div>
            <canvas id="screen" width="160" height="144"></canvas>
        </div>

        <div class="mobile-controls">
            <div class="dpad">
                <div class="ctrl-btn square up" ontouchstart="handleTouch('arrowup', true)" ontouchend="handleTouch('arrowup', false)">↑</div>
                <div class="ctrl-btn square left" ontouchstart="handleTouch('arrowleft', true)" ontouchend="handleTouch('arrowleft', false)">←</div>
                <div class="ctrl-btn square right" ontouchstart="handleTouch('arrowright', true)" ontouchend="handleTouch('arrowright', false)">→</div>
                <div class="ctrl-btn square down" ontouchstart="handleTouch('arrowdown', true)" ontouchend="handleTouch('arrowdown', false)">↓</div>
            </div>
            
            <div class="menu-btns">
                <div class="ctrl-btn slim" ontouchstart="handleTouch('s', true)" ontouchend="handleTouch('s', false)">SELECT</div>
                <div class="ctrl-btn slim" ontouchstart="handleTouch('enter', true)" ontouchend="handleTouch('enter', false)">START</div>
            </div>

            <div class="btn-action-group">
                <div class="ctrl-btn round" ontouchstart="handleTouch('b', true)" ontouchend="handleTouch('b', false)">B</div>
                <div class="ctrl-btn round" ontouchstart="handleTouch('a', true)" ontouchend="handleTouch('a', false)">A</div>
            </div>
        </div>

        <div class="button-group">
            <input type="file" id="rom-upload" class="hidden" accept=".gb">
            <button onclick="document.getElementById('rom-upload').click()">Load ROM</button>
            
            <input type="file" id="sav-upload" class="hidden" accept=".sav">
            <button class="btn-sec" onclick="document.getElementById('sav-upload').click()">Import .sav</button>
            
            <button class="btn-accent" onclick="saveSnapshot()">Save State</button>
            <button class="btn-sec" onclick="clearStorage()">Reset</button>
        </div>
    </div>

    <script type="module">
        import init, { EmulatorState } from './pkg/pokegameboy.js';

        let emu, wasm_mem;
        let dpad = 0x0F, buttons = 0x0F;

        async function setup() {
            const wasm = await init();
            wasm_mem = wasm.memory;
            const savedRom = localStorage.getItem('stored_rom');
            if (savedRom) startEmulator(new Uint8Array(JSON.parse(savedRom)));
        }

        function startEmulator(bytes) {
            emu = new EmulatorState(bytes);
            const ctx = document.getElementById('screen').getContext('2d');
            
            // Auto-load SRAM if exists
            const savedSram = localStorage.getItem('sram_save');
            if (savedSram) emu.load_save_wasm(new Uint8Array(JSON.parse(savedSram)));

            function frame() {
                emu.tick_frame();
                const ptr = emu.framebuffer_ptr();
                const pixels = new Uint8ClampedArray(wasm_mem.buffer, ptr, 160 * 144 * 4);
                ctx.putImageData(new ImageData(pixels, 160, 144), 0, 0);
                
                // Debugger Updates (Placeholder - link to your Rust getters)
                // document.getElementById('reg-pc').innerText = emu.get_pc().toString(16).toUpperCase();
                
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        window.saveSnapshot = () => {
            if (!emu) return;
            const sram = emu.save_wasm();
            if (sram.length > 0) {
                const blob = new Blob([sram], { type: 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'game_save.sav';
                a.click();
                URL.revokeObjectURL(url);
            }
        };

        window.handleTouch = (key, isDown) => {
            if (isDown && window.navigator.vibrate) window.navigator.vibrate(10);
            // Input logic mapping...
        };

        document.getElementById('rom-upload').onchange = async (e) => {
            const file = e.target.files[0];
            const bytes = new Uint8Array(await file.arrayBuffer());
            localStorage.setItem('stored_rom', JSON.stringify(Array.from(bytes)));
            startEmulator(bytes);
        };

        document.getElementById('sav-upload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || !emu) return;
            const bytes = new Uint8Array(await file.arrayBuffer());
            emu.load_save_wasm(bytes);
        };

        window.clearStorage = () => { localStorage.clear(); location.reload(); };
        setup();
    </script>
</body>
</html>
