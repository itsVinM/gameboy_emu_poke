<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PokéGB</title>
    <style>
        body { background: #121212; color: #fff; text-align: center; font-family: sans-serif; }
        canvas { 
            width: 640px; height: 576px; 
            image-rendering: pixelated; 
            border: 5px solid #333; 
            margin-top: 20px;
        }
        .ui { margin-top: 20px; }
        .hidden { display: none; }
        #status { color: #ffcb05; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>PokéGB WASM</h1>
    <div id="status">Waiting for ROM...</div>
    <canvas id="screen" width="160" height="144"></canvas>

    <div class="ui">
        <input type="file" id="loader" class="hidden" accept=".gb">
        <button id="upload-btn">Load ROM (.gb)</button>
        <button id="clear-btn">Clear Stored ROM</button>
    </div>

   <script type="module">
    import init, { EmulatorState } from './pkg/pokegameboy.js';

    let emu, wasm_mem;
    let dpad = 0x0F;    // All bits 1 (released)
    let buttons = 0x0F; // All bits 1 (released)
    const status = document.getElementById('status');

    async function setup() {
        try {
            // Explicitly point to the JS glue. 
            // The browser will look for pokegameboy_bg.wasm automatically.
            const wasm = await init();
            wasm_mem = wasm.memory;
            console.log("WASM Initialized successfully");
            
            const savedRom = localStorage.getItem('stored_rom');
            if (savedRom) {
                status.innerText = "Auto-loading saved ROM...";
                startWithBytes(new Uint8Array(JSON.parse(savedRom)));
            } else {
                status.innerText = "Ready. Please upload a ROM.";
            }
        } catch (err) {
            status.innerText = "FATAL: WASM failed to load.";
            console.error(err);
        }
    }

    function startWithBytes(bytes) {
        try {
            emu = new EmulatorState(bytes);
            status.innerText = "RUNNING";
            
            const canvas = document.getElementById('screen');
            const ctx = canvas.getContext('2d');
            
            function loop() {
                emu.tick_frame();
                const ptr = emu.framebuffer_ptr();
                // 160 * 144 * 4 bytes for RGBA
                const pixels = new Uint8ClampedArray(wasm_mem.buffer, ptr, 92160);
                ctx.putImageData(new ImageData(pixels, 160, 144), 0, 0);
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        } catch (err) {
            status.innerText = "Error initializing Emulator.";
            console.error(err);
        }
    }

    // --- INPUT HANDLING ---
    const keyMap = {
        "arrowdown": "d08", "arrowup": "d04", "arrowleft": "d02", "arrowright": "d01",
        "enter": "b08", "s": "b04", "x": "b02", "z": "b01"
    };

    function handleKey(e, isDown) {
        const action = keyMap[e.key.toLowerCase()];
        if (!action) return;
        
        e.preventDefault();
        const bit = parseInt(action.substring(1), 16);
        if (action.startsWith("d")) {
            isDown ? dpad &= ~bit : dpad |= bit;
        } else {
            isDown ? buttons &= ~bit : buttons |= bit;
        }
        
        if (emu) emu.update_joypad(dpad, buttons);
    }

    window.addEventListener("keydown", (e) => handleKey(e, true));
    window.addEventListener("keyup", (e) => handleKey(e, false));

    // Handle Manual Upload
    document.getElementById('upload-btn').onclick = () => document.getElementById('loader').click();
    document.getElementById('loader').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const buffer = await file.arrayBuffer();
        const bytes = new Uint8Array(buffer);
        
        try {
            localStorage.setItem('stored_rom', JSON.stringify(Array.from(bytes)));
            console.log("ROM saved to storage");
        } catch(e) { 
            console.warn("Storage full, ROM not cached."); 
        }
        
        startWithBytes(bytes);
    };

    document.getElementById('clear-btn').onclick = () => {
        localStorage.removeItem('stored_rom');
        location.reload();
    };

    setup();
</script>
