<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦀 RUST GAMEBOY - LR35902 RUNTIME</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --oxide: #f9612e;
            --btn-dark: #2c2c2e;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --border-light: #e5e5e7;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            align-items: center;
            justify-content: center;
            touch-action: none;
            overflow: hidden;
        }

        .console-card {
            background: var(--surface);
            padding: clamp(16px, 4vw, 40px) clamp(12px, 3vw, 30px);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.06);
            width: 95vw;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-meta {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(12px, 3vw, 25px);
            padding: 0 10px;
        }

        .brand {
            font-weight: 900;
            font-size: clamp(0.7rem, 2.5vw, 1.1rem);
            color: var(--oxide);
            font-style: italic;
            letter-spacing: -0.5px;
        }

        #status {
            font-family: 'JetBrains Mono';
            font-size: clamp(7px, 1.5vw, 9px);
            font-weight: 800;
            color: var(--oxide);
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .display-container {
            width: 100%;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            margin-bottom: clamp(16px, 4vw, 35px);
        }

        canvas {
            width: 100%;
            aspect-ratio: 160 / 144;
            image-rendering: pixelated;
            display: block;
        }

        .controls-layout {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            padding: 0 clamp(4px, 2vw, 10px);
            margin-bottom: clamp(16px, 4vw, 40px);
        }

        .dpad {
            display: grid;
            grid-template-areas: ". u ." "l . r" ". d .";
            gap: clamp(4px, 1.5vw, 10px);
        }

        .center-group {
            display: flex;
            flex-direction: column;
            gap: clamp(4px, 1.5vw, 8px);
            transform: translateY(12px);
        }

        .action-group {
            display: flex;
            gap: clamp(8px, 3vw, 18px);
        }

        .ctrl-btn {
            background: var(--btn-dark);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 6px 0 #000;
            transition: all 0.08s ease;
        }

        .sq {
            width:  clamp(32px, 8vw, 50px);
            height: clamp(32px, 8vw, 50px);
            border-radius: clamp(8px, 2vw, 14px);
            font-size: clamp(12px, 3vw, 18px);
        }

        .round {
            width:  clamp(44px, 11vw, 68px);
            height: clamp(44px, 11vw, 68px);
            border-radius: 50%;
            font-size: clamp(14px, 4vw, 22px);
        }

        .pill {
            width:  clamp(40px, 10vw, 60px);
            height: clamp(16px, 4vw, 22px);
            border-radius: 20px;
            font-size: clamp(6px, 1.5vw, 8px);
            box-shadow: 0 3px 0 #000;
        }

        .ctrl-btn.active, .ctrl-btn:active {
            background: var(--oxide);
            transform: translateY(3px);
            box-shadow: 0 2px 0 #000;
        }

        .footer-tools {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(6px, 2vw, 12px);
            width: 100%;
        }

        .sys-btn {
            background: var(--btn-dark);
            color: white;
            border: none;
            padding: clamp(10px, 2.5vw, 14px);
            border-radius: 14px;
            font-weight: 700;
            font-size: clamp(7px, 1.5vw, 9px);
            font-family: 'JetBrains Mono';
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-sec {
            background: white;
            color: var(--text-main);
            border: 1px solid var(--border-light);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="console-card">
        <div class="header-meta">
            <div class="brand">🦀 RUST GAMEBOY - LR35902 RUNTIME</div>
            <div id="status">HARDWARE STANDBY</div>
        </div>

        <div class="display-container">
            <canvas id="screen" width="160" height="144"></canvas>
        </div>

        <div class="controls-layout">
            <div class="dpad">
                <div id="btn-arrowup"    class="ctrl-btn sq" style="grid-area:u" ontouchstart="handleTouch('arrowup',    true)" ontouchend="handleTouch('arrowup',    false)">↑</div>
                <div id="btn-arrowleft"  class="ctrl-btn sq" style="grid-area:l" ontouchstart="handleTouch('arrowleft',  true)" ontouchend="handleTouch('arrowleft',  false)">←</div>
                <div id="btn-arrowright" class="ctrl-btn sq" style="grid-area:r" ontouchstart="handleTouch('arrowright', true)" ontouchend="handleTouch('arrowright', false)">→</div>
                <div id="btn-arrowdown"  class="ctrl-btn sq" style="grid-area:d" ontouchstart="handleTouch('arrowdown',  true)" ontouchend="handleTouch('arrowdown',  false)">↓</div>
            </div>

            <div class="center-group">
                <div id="btn-s"     class="ctrl-btn pill" ontouchstart="handleTouch('s',     true)" ontouchend="handleTouch('s',     false)">SELECT</div>
                <div id="btn-enter" class="ctrl-btn pill" ontouchstart="handleTouch('enter', true)" ontouchend="handleTouch('enter', false)">START</div>
            </div>

            <div class="action-group">
                <div id="btn-b" class="ctrl-btn round" ontouchstart="handleTouch('b', true)" ontouchend="handleTouch('b', false)">B</div>
                <div id="btn-a" class="ctrl-btn round" ontouchstart="handleTouch('a', true)" ontouchend="handleTouch('a', false)">A</div>
            </div>
        </div>

        <div class="footer-tools">
            <input type="file" id="rom-upload" class="hidden" accept=".gb">
            <input type="file" id="sav-upload" class="hidden" accept=".sav">

            <button class="sys-btn" onclick="document.getElementById('rom-upload').click()">LOAD ROM</button>
            <button class="sys-btn" onclick="exportSram()">EXPORT .SAV</button>
            <button class="sys-btn btn-sec" onclick="document.getElementById('sav-upload').click()">IMPORT .SAV</button>
            <button class="sys-btn btn-sec" onclick="clearStorage()" style="color:#ff3b30;">WIPE ALL</button>
        </div>
    </div>

    <script type="module">
        import init, { EmulatorState } from './pkg/pokegameboy.js';

        let emu, wasm_mem;
        let dpad       = 0x0F;
        let buttons    = 0x0F;
        let saveLoaded = false;
        let frameCount = 0;
        const SAVE_INJECT_FRAME = 10;
        const statusEl = document.getElementById('status');

        const keyMap = {
            "arrowdown":  { type: "d", bit: 0x08 },
            "arrowup":    { type: "d", bit: 0x04 },
            "arrowleft":  { type: "d", bit: 0x02 },
            "arrowright": { type: "d", bit: 0x01 },
            "enter":      { type: "b", bit: 0x08 },
            "s":          { type: "b", bit: 0x04 },
            "b":          { type: "b", bit: 0x02 },
            "a":          { type: "b", bit: 0x01 }
        };

        // ── helpers ──────────────────────────────────────────────

        function persistSave() {
            if (!emu) return false;
            const saveBytes = emu.save_wasm();
            const hasData = saveBytes && saveBytes.length > 0
                && saveBytes.some(b => b !== 0);
            if (hasData) {
                localStorage.setItem('auto_save_sram',
                    JSON.stringify(Array.from(saveBytes)));
            }
            return hasData;
        }

        function showStatus(msg, color, duration = 1200) {
            statusEl.innerText   = msg;
            statusEl.style.color = color || '';
            if (duration) {
                setTimeout(() => {
                    statusEl.innerText   = "LIVE";
                    statusEl.style.color = '';
                }, duration);
            }
        }

        // ── boot ─────────────────────────────────────────────────

        async function setup() {
            try {
                const wasm = await init();
                wasm_mem = wasm.memory;
                const savedRom = localStorage.getItem('stored_rom');
                if (savedRom) {
                    statusEl.innerText = "RESUMING SYSTEM...";
                    startEmulator(new Uint8Array(JSON.parse(savedRom)));
                } else {
                    statusEl.innerText = "WAITING FOR CARTRIDGE";
                }
            } catch (err) {
                console.error(err);
                statusEl.innerText = "INIT ERROR";
            }
        }

        function startEmulator(bytes) {
            try {
                emu        = new EmulatorState(bytes);
                saveLoaded = false;
                frameCount = 0;
                statusEl.innerText = "BOOTING...";

                const ctx = document.getElementById('screen').getContext('2d');

                function frame() {
                    emu.tick_frame();
                    frameCount++;

                    // inject save after game boot init — MBC RAM enable
                    // happens in the first few frames of the game's own code
                    if (!saveLoaded && frameCount >= SAVE_INJECT_FRAME) {
                        const stored = localStorage.getItem('auto_save_sram');
                        if (stored) {
                            try {
                                const sramBytes = new Uint8Array(JSON.parse(stored));
                                emu.load_save_wasm(sramBytes);
                                console.log(`SRAM injected at frame ${frameCount} (${sramBytes.length} bytes)`);
                            } catch(e) {
                                console.warn("SRAM restore failed:", e);
                            }
                        }
                        saveLoaded = true;
                        statusEl.innerText = "LIVE";
                    }

                    const ptr    = emu.framebuffer_ptr();
                    const pixels = new Uint8ClampedArray(wasm_mem.buffer, ptr, 160 * 144 * 4);
                    ctx.putImageData(new ImageData(pixels, 160, 144), 0, 0);
                    requestAnimationFrame(frame);
                }
                requestAnimationFrame(frame);

                // auto-save every 5 s
                setInterval(() => {
                    if (persistSave()) showStatus("SYNCED", "#4cd964");
                }, 5000);

            } catch (err) {
                console.error(err);
                statusEl.innerText = "HARDWARE FAULT";
            }
        }

        // ── joypad ───────────────────────────────────────────────

        function updateJoypadState(keyName, isDown) {
            const config = keyMap[keyName];
            if (!config || !emu) return;
            const btn = document.getElementById(`btn-${keyName}`);
            if (btn) isDown ? btn.classList.add('active') : btn.classList.remove('active');
            if (config.type === "d") {
                isDown ? dpad    &= ~config.bit : dpad    |= config.bit;
            } else {
                isDown ? buttons &= ~config.bit : buttons |= config.bit;
            }
            emu.update_joypad(dpad, buttons);
        }

        // ── export .sav — Firefox + Chrome + Safari ───────────────
        // Key rule: the synchronous fallback path (Firefox/Safari) must
        // not have any await before link.click() or the browser blocks it.
        // We handle Chrome/Edge via showSaveFilePicker (fully async, fine).

        window.exportSram = async () => {
            if (!emu) return;
            const saveBytes = emu.save_wasm();
            if (!saveBytes || saveBytes.length === 0) {
                showStatus("NO SAVE DATA", "#ff3b30");
                return;
            }

            localStorage.setItem('auto_save_sram',
                JSON.stringify(Array.from(saveBytes)));

            const blob = new Blob([new Uint8Array(saveBytes)],
                { type: 'application/octet-stream' });

            // Chrome / Edge 86+ — native save dialog
            if (window.showSaveFilePicker) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: 'trainer_save.sav',
                        types: [{
                            description: 'Game Boy Save File',
                            accept: { 'application/octet-stream': ['.sav'] }
                        }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    showStatus("SAV EXPORTED", "#4cd964");
                    return;
                } catch (e) {
                    if (e.name === 'AbortError') return; // user cancelled
                    // fall through to legacy path
                }
            }

            // Firefox / Safari — synchronous, must stay sync from here
            const url  = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href     = url;
            link.download = 'trainer_save.sav';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
            showStatus("SAV EXPORTED", "#4cd964");
        };

        // ── import .sav ───────────────────────────────────────────

        document.getElementById('sav-upload').onchange = async (e) => {
            if (!emu) return;
            const file  = e.target.files[0];
            const bytes = new Uint8Array(await file.arrayBuffer());
            emu.load_save_wasm(bytes);
            localStorage.setItem('auto_save_sram',
                JSON.stringify(Array.from(bytes)));
            showStatus("SAV INJECTED", "#4cd964");
        };

        document.getElementById('rom-upload').onchange = async (e) => {
            const bytes = new Uint8Array(await e.target.files[0].arrayBuffer());
            localStorage.setItem('stored_rom',
                JSON.stringify(Array.from(bytes)));
            startEmulator(bytes);
        };

        // ── save on close ─────────────────────────────────────────

        window.addEventListener('beforeunload', () => persistSave());
        window.addEventListener('pagehide',     () => persistSave()); // iOS Safari

        // ── keyboard ──────────────────────────────────────────────

        window.addEventListener("keydown", (e) => {
            const key = e.key.toLowerCase();
            if (keyMap[key]) { e.preventDefault(); updateJoypadState(key, true); }
        });
        window.addEventListener("keyup", (e) => {
            const key = e.key.toLowerCase();
            if (keyMap[key]) updateJoypadState(key, false);
        });

        // ── misc ──────────────────────────────────────────────────

        window.handleTouch = (keyName, isDown) => updateJoypadState(keyName, isDown);

        window.clearStorage = () => {
            if (confirm("Confirm: Wipe all ROM and progress data?")) {
                localStorage.clear();
                location.reload();
            }
        };

        setup();
    </script>
</body>
</html>
