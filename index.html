<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦀 Rust Gameboy LR35902 Runtime</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --lcd-bg: #1a1a1d; 
            --accent: #f9612e;
            --accent-glow: rgba(249, 97, 46, 0.3);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
        }

        body { 
            background: radial-gradient(circle at top left, #ffffff, #e2e8f0);
            color: var(--text-main); 
            display: flex;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            align-items: center;
            justify-content: center;
        }

        .console-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 340px;
        }

        h1 { 
            font-size: 1rem;
            font-weight: 800; 
            margin: 0 0 4px 0; 
            letter-spacing: -0.5px;
            text-transform: uppercase;
            font-style: italic;
            background: linear-gradient(to right, #1d1d1f, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #status { 
            font-size: 8px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .screen-container {
            background: #000;
            padding: 4px;
            border-radius: 12px;
            box-shadow: 0 0 0 1px #fff, 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: inline-block;
        }

        canvas { 
            width: 320px; 
            height: 288px; 
            image-rendering: pixelated; 
            background: var(--lcd-bg);
            display: block;
            border-radius: 8px;
        }

        .legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 9px;
            font-weight: 700;
            color: var(--text-muted);
            text-align: left;
            background: rgba(0,0,0,0.03);
            padding: 10px;
            border-radius: 8px;
        }

        .legend b { color: var(--text-main); }
        .legend span { border-left: 1.5px solid var(--accent); padding-left: 6px; }

        .button-group { display: flex; gap: 8px; justify-content: center; }

        button {
            background: #1d1d1f;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        button:hover { background: var(--accent); transform: translateY(-1px); }
        .btn-sec { background: transparent; color: var(--text-main); border: 1px solid #d1d1d6; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="console-card">
        <h1>🦀 Rust Gameboy -  LR35902 Runtime</h1>
        <div id="status">Hardware Standby</div>
        
        <div class="screen-container">
            <canvas id="screen" width="160" height="144"></canvas>
        </div>

        <div class="legend">
            <span>DPAD: <b>Arrows</b></span>
            <span>A / B: <b>A / B Keys</b></span>
            <span>START: <b>Enter</b></span>
            <span>SELECT/SAVE: <b>S Key</b></span>
        </div>

        <div class="button-group">
            <input type="file" id="rom-upload" class="hidden" accept=".gb">
            <button onclick="document.getElementById('rom-upload').click()">Load ROM</button>
            
            <input type="file" id="sav-upload" class="hidden" accept=".sav">
            <button class="btn-sec" onclick="document.getElementById('sav-upload').click()">Import .sav</button>

            <button class="btn-sec" onclick="clearStorage()">Reset</button>
        </div>
    </div>

    <script type="module">
        import init, { EmulatorState } from './pkg/pokegameboy.js';

        let emu, wasm_mem;
        let dpad = 0x0F;    
        let buttons = 0x0F; 
        const statusEl = document.getElementById('status');

        async function setup() {
            try {
                const wasm = await init();
                wasm_mem = wasm.memory;
                
                const savedRom = localStorage.getItem('stored_rom');
                if (savedRom) {
                    statusEl.innerText = "System Ready: Resuming...";
                    startEmulator(new Uint8Array(JSON.parse(savedRom)));
                } else {
                    statusEl.innerText = "Waiting for Cartridge";
                }
            } catch (err) {
                statusEl.innerText = "Runtime Initialization Error";
                console.error(err);
            }
        }

        function startEmulator(bytes) {
            try {
                emu = new EmulatorState(bytes);
                statusEl.innerText = "Live";
                const ctx = document.getElementById('screen').getContext('2d');
                
                function frame() {
                    emu.tick_frame();
                    const ptr = emu.framebuffer_ptr();
                    const pixels = new Uint8ClampedArray(wasm_mem.buffer, ptr, 160 * 144 * 4);
                    ctx.putImageData(new ImageData(pixels, 160, 144), 0, 0);
                    requestAnimationFrame(frame);
                }
                requestAnimationFrame(frame);
            } catch (err) {
                statusEl.innerText = "Hardware Fault";
                console.error(err);
            }
        }

        // --- Keyboard Mapping (1:1 with your Rust cfg logic) ---
        const keyMap = {
            "arrowdown":  { type: "d", bit: 0x08 },
            "arrowup":    { type: "d", bit: 0x04 },
            "arrowleft":  { type: "d", bit: 0x02 },
            "arrowright": { type: "d", bit: 0x01 },
            "enter":      { type: "b", bit: 0x08 }, // Start
            "s":          { type: "b", bit: 0x04 }, // Select
            "b":          { type: "b", bit: 0x02 }, // B
            "a":          { type: "b", bit: 0x01 }  // A
        };

        function handleInput(e, isDown) {
            const key = e.key.toLowerCase();
            const config = keyMap[key];
            if (!config) return;

            e.preventDefault();
            
            if (config.type === "d") {
                isDown ? dpad &= ~config.bit : dpad |= config.bit;
            } else {
                isDown ? buttons &= ~config.bit : buttons |= config.bit;
            }

            if (emu) {
                emu.update_joypad(dpad, buttons);
                
                // Pressing 'S' (Select) triggers the SRAM save download
                if (key === 's' && isDown) {
                    const saveBytes = emu.save_wasm();
                    if (saveBytes.length > 0) saveToFile(saveBytes);
                }
            }
        }

        function saveToFile(data) {
            const blob = new Blob([new Uint8Array(data)], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'game_progress.sav';
            link.click();
            URL.revokeObjectURL(url);
            statusEl.innerText = "SRAM Snapshot Exported";
            setTimeout(() => statusEl.innerText = "Live", 1500);
        }

        window.addEventListener("keydown", (e) => handleInput(e, true));
        window.addEventListener("keyup", (e) => handleInput(e, false));

        document.getElementById('rom-upload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const bytes = new Uint8Array(await file.arrayBuffer());
            localStorage.setItem('stored_rom', JSON.stringify(Array.from(bytes)));
            startEmulator(bytes);
        };

        document.getElementById('sav-upload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || !emu) return;
            const bytes = new Uint8Array(await file.arrayBuffer());
            emu.load_save_wasm(bytes);
            statusEl.innerText = "SRAM Data Injected";
            setTimeout(() => statusEl.innerText = "Live", 1500);
        };

        window.clearStorage = () => {
            localStorage.removeItem('stored_rom');
            location.reload();
        };

        setup();
    </script>
</body>
</html>
