<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦀 Rust Gameboy LR35902 Runtime</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --lcd-bg: #1a1a1d; 
            --accent: #f9612e;
            --accent-glow: rgba(249, 97, 46, 0.3);
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --btn-gray: #2c2c2e;
        }

        body { 
            background: radial-gradient(circle at top left, #ffffff, #e2e8f0);
            color: var(--text-main); 
            display: flex;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        .console-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 340px;
        }

        h1 { 
            font-size: 1rem;
            font-weight: 800; 
            margin: 0 0 4px 0; 
            letter-spacing: -0.5px;
            text-transform: uppercase;
            font-style: italic;
            background: linear-gradient(to right, #1d1d1f, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #status { 
            font-size: 8px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .screen-container {
            background: #000;
            padding: 4px;
            border-radius: 12px;
            box-shadow: 0 0 0 1px #fff, 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: inline-block;
        }

        canvas { 
            width: 320px; 
            height: 288px; 
            image-rendering: pixelated; 
            background: var(--lcd-bg);
            display: block;
            border-radius: 8px;
        }

        .mobile-controls {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            user-select: none;
            -webkit-user-select: none;
        }

        .dpad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left center right"
                ". down .";
            gap: 4px;
        }

        .btn-action-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* --- FIXED CSS HERE --- */
        .ctrl-btn {
            background: var(--btn-gray);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
            touch-action: manipulation;
            box-shadow: 0 4px 0 #000;
            transition: transform 0.05s;
        }

        .ctrl-btn:active {
            background: var(--accent);
            transform: translateY(2px);
            box-shadow: 0 2px 0 #000;
        }

        .round { border-radius: 50%; width: 50px; height: 50px; }
        .up { grid-area: up; }
        .down { grid-area: down; }
        .left { grid-area: left; }
        .right { grid-area: right; }

        .legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 9px;
            font-weight: 700;
            color: var(--text-muted);
            text-align: left;
            background: rgba(0,0,0,0.03);
            padding: 10px;
            border-radius: 8px;
        }

        @media (max-width: 600px) {
            .mobile-controls { display: grid; }
            .legend { display: none; }
            .console-card { width: 92vw; padding: 16px; }
            canvas { width: 100%; height: auto; }
        }

        .button-group { display: flex; gap: 8px; justify-content: center; margin-top: 10px;}
        button {
            background: #1d1d1f;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
        }
        .btn-sec { background: transparent; color: var(--text-main); border: 1px solid #d1d1d6; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="console-card">
        <h1>🦀 Rust Gameboy</h1>
        <div id="status">Hardware Standby</div>
        
        <div class="screen-container">
            <canvas id="screen" width="160" height="144"></canvas>
        </div>

        <div class="legend">
            <span>DPAD: <b>Arrows</b></span>
            <span>A / B: <b>A / B Keys</b></span>
            <span>START: <b>Enter</b></span>
            <span>SELECT/SAVE: <b>S Key</b></span>
        </div>

        <div class="mobile-controls">
            <div class="dpad">
                <div class="ctrl-btn up" ontouchstart="handleTouch('arrowup', true)" ontouchend="handleTouch('arrowup', false)">↑</div>
                <div class="ctrl-btn left" ontouchstart="handleTouch('arrowleft', true)" ontouchend="handleTouch('arrowleft', false)">←</div>
                <div class="ctrl-btn right" ontouchstart="handleTouch('arrowright', true)" ontouchend="handleTouch('arrowright', false)">→</div>
                <div class="ctrl-btn down" ontouchstart="handleTouch('arrowdown', true)" ontouchend="handleTouch('arrowdown', false)">↓</div>
            </div>
            <div class="btn-action-group">
                <div class="ctrl-btn round" ontouchstart="handleTouch('b', true)" ontouchend="handleTouch('b', false)">B</div>
                <div class="ctrl-btn round" ontouchstart="handleTouch('a', true)" ontouchend="handleTouch('a', false)">A</div>
            </div>
        </div>

        <div class="button-group">
            <input type="file" id="rom-upload" class="hidden" accept=".gb">
            <button onclick="document.getElementById('rom-upload').click()">Load ROM</button>
            <button class="btn-sec" onclick="document.getElementById('sav-upload').click()">Import .sav</button>
            <input type="file" id="sav-upload" class="hidden" accept=".sav">
            <button class="btn-sec" onclick="clearStorage()">Reset</button>
        </div>
    </div>

    <script type="module">
        import init, { EmulatorState } from './pkg/pokegameboy.js';

        let emu, wasm_mem, saveInterval;
        let dpad = 0x0F;    
        let buttons = 0x0F; 
        const statusEl = document.getElementById('status');

        async function setup() {
            try {
                const wasm = await init();
                wasm_mem = wasm.memory;
                
                const savedRom = localStorage.getItem('stored_rom');
                if (savedRom) {
                    statusEl.innerText = "Resuming...";
                    startEmulator(new Uint8Array(JSON.parse(savedRom)));
                } else {
                    statusEl.innerText = "Waiting for Cartridge";
                }
            } catch (err) {
                statusEl.innerText = "Runtime Error";
            }
        }

        function startEmulator(bytes) {
            try {
                emu = new EmulatorState(bytes);
                statusEl.innerText = "Live";
                
                // --- AUTO-LOAD SAVED PROGRESS ---
                const savedData = localStorage.getItem('sram_save');
                if (savedData) {
                    emu.load_save_wasm(new Uint8Array(JSON.parse(savedData)));
                    console.log("SRAM Restored from LocalStorage");
                }

                // --- START AUTO-SAVE LOOP (Every 5 seconds) ---
                if (saveInterval) clearInterval(saveInterval);
                saveInterval = setInterval(() => {
                    if (emu) {
                        const sram = emu.save_wasm();
                        if (sram.length > 0) {
                            localStorage.setItem('sram_save', JSON.stringify(Array.from(sram)));
                        }
                    }
                }, 5000);

                const ctx = document.getElementById('screen').getContext('2d');
                function frame() {
                    emu.tick_frame();
                    const ptr = emu.framebuffer_ptr();
                    const pixels = new Uint8ClampedArray(wasm_mem.buffer, ptr, 160 * 144 * 4);
                    ctx.putImageData(new ImageData(pixels, 160, 144), 0, 0);
                    requestAnimationFrame(frame);
                }
                requestAnimationFrame(frame);
            } catch (err) {
                statusEl.innerText = "Hardware Fault";
            }
        }

        const keyMap = {
            "arrowdown":  { type: "d", bit: 0x08 },
            "arrowup":    { type: "d", bit: 0x04 },
            "arrowleft":  { type: "d", bit: 0x02 },
            "arrowright": { type: "d", bit: 0x01 },
            "enter":      { type: "b", bit: 0x08 }, 
            "s":          { type: "b", bit: 0x04 }, 
            "b":          { type: "b", bit: 0x02 }, 
            "a":          { type: "b", bit: 0x01 }  
        };

        function updateJoypadState(keyName, isDown) {
            const config = keyMap[keyName];
            if (!config || !emu) return;
            if (config.type === "d") {
                isDown ? dpad &= ~config.bit : dpad |= config.bit;
            } else {
                isDown ? buttons &= ~config.bit : buttons |= config.bit;
            }
            emu.update_joypad(dpad, buttons);
        }

        window.addEventListener("keydown", (e) => {
            const key = e.key.toLowerCase();
            if (keyMap[key]) {
                e.preventDefault();
                updateJoypadState(key, true);
                // Manual backup to file on 'S' key
                if (key === 's') {
                    const saveBytes = emu.save_wasm();
                    if (saveBytes.length > 0) saveToFile(saveBytes);
                }
            }
        });

        window.addEventListener("keyup", (e) => {
            const key = e.key.toLowerCase();
            if (keyMap[key]) updateJoypadState(key, false);
        });

        window.handleTouch = (keyName, isDown) => {
            updateJoypadState(keyName, isDown);
        };

        function saveToFile(data) {
            const blob = new Blob([new Uint8Array(data)], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'game_progress.sav';
            link.click();
            URL.revokeObjectURL(url);
        }

        document.getElementById('rom-upload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const bytes = new Uint8Array(await file.arrayBuffer());
            localStorage.setItem('stored_rom', JSON.stringify(Array.from(bytes)));
            startEmulator(bytes);
        };

        document.getElementById('sav-upload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || !emu) return;
            const bytes = new Uint8Array(await file.arrayBuffer());
            emu.load_save_wasm(bytes);
            statusEl.innerText = "SRAM Injected";
        };

        window.clearStorage = () => {
            localStorage.removeItem('stored_rom');
            localStorage.removeItem('sram_save');
            location.reload();
        };

        setup();
    </script>
</body>
</html>
