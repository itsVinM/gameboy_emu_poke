<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦀 Rust Gameboy Runtime</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: rgba(255, 255, 255, 0.98);
            --accent: #f9612e;
            --text-main: #1d1d1f;
            --btn-gray: #2c2c2e;
        }

        body { 
            background: var(--bg);
            color: var(--text-main); 
            display: flex;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        .console-card {
            background: var(--surface);
            padding: 24px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            width: 584px; /* Perfectly fits the 560px canvas + padding */
        }

        .header-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        h1 { 
            font-size: 1rem;
            font-weight: 800; 
            margin: 0; 
            font-style: italic;
            text-transform: uppercase;
            background: linear-gradient(to right, #1d1d1f, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- SCREEN CONTAINER --- */
        .screen-container {
            background: #000;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            overflow: hidden;
            line-height: 0;
            width: 560px;
            margin-left: auto;
            margin-right: auto;
        }

        canvas { 
            width: 560px; /* 3.5x scale */
            height: 504px; 
            image-rendering: pixelated; 
            display: block;
        }

        /* --- CONTROLS --- */
        .mobile-controls {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }

        .dpad { display: grid; grid-template-areas: ". up ." "left center right" ". down ."; gap: 6px; }
        .btn-action-group { display: flex; gap: 12px; }
        .menu-btns { display: flex; flex-direction: column; gap: 8px; }

        .ctrl-btn {
            background: var(--btn-gray);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            box-shadow: 0 4px 0 #000;
            cursor: pointer;
            user-select: none;
        }

        .square { width: 50px; height: 50px; border-radius: 10px; font-size: 18px; }
        .round { width: 56px; height: 56px; border-radius: 50%; font-size: 20px; }
        .slim { width: 58px; height: 20px; border-radius: 20px; font-size: 8px; box-shadow: 0 2px 0 #000; }

        .ctrl-btn:active { background: var(--accent); transform: translateY(2px); box-shadow: 0 1px 0 #000; }

        .up { grid-area: up; } .down { grid-area: down; }
        .left { grid-area: left; } .right { grid-area: right; }

        /* --- TOOLBAR --- */
        .button-group { display: flex; gap: 8px; justify-content: center; }
        button {
            background: #1d1d1f; color: #fff; border: none;
            padding: 10px 14px; border-radius: 8px; cursor: pointer;
            font-weight: 700; font-size: 10px; font-family: 'JetBrains Mono';
        }
        .btn-sec { background: #e2e8f0; color: #1d1d1f; }
        .btn-accent { background: var(--accent); }
    </style>
</head>
<body>

    <div class="console-card">
        <div class="header-meta">
            <h1>🦀 Rust Gameboy</h1>
            <div style="font-size: 9px; font-weight: 800; color: #86868b;">ZRH_ENGINEERING</div>
        </div>

        <div class="screen-container">
            <canvas id="screen" width="160" height="144"></canvas>
        </div>

        <div class="mobile-controls">
            <div class="dpad">
                <div class="ctrl-btn square up" ontouchstart="handleTouch('arrowup', true)" ontouchend="handleTouch('arrowup', false)">↑</div>
                <div class="ctrl-btn square left" ontouchstart="handleTouch('arrowleft', true)" ontouchend="handleTouch('arrowleft', false)">←</div>
                <div class="ctrl-btn square right" ontouchstart="handleTouch('arrowright', true)" ontouchend="handleTouch('arrowright', false)">→</div>
                <div class="ctrl-btn square down" ontouchstart="handleTouch('arrowdown', true)" ontouchend="handleTouch('arrowdown', false)">↓</div>
            </div>
            
            <div class="menu-btns">
                <div class="ctrl-btn slim" ontouchstart="handleTouch('s', true)" ontouchend="handleTouch('s', false)">SELECT</div>
                <div class="ctrl-btn slim" ontouchstart="handleTouch('enter', true)" ontouchend="handleTouch('enter', false)">START</div>
            </div>

            <div class="btn-action-group">
                <div class="ctrl-btn round" ontouchstart="handleTouch('b', true)" ontouchend="handleTouch('b', false)">B</div>
                <div class="ctrl-btn round" ontouchstart="handleTouch('a', true)" ontouchend="handleTouch('a', false)">A</div>
            </div>
        </div>

        <div class="button-group">
            <input type="file" id="rom-upload" style="display:none" accept=".gb">
            <button onclick="document.getElementById('rom-upload').click()">LOAD ROM</button>
            
            <input type="file" id="sav-upload" style="display:none" accept=".sav">
            <button class="btn-sec" onclick="document.getElementById('sav-upload').click()">IMPORT .SAV</button>
            
            <button class="btn-accent" onclick="saveSnapshot()">SAVE STATE</button>
            <button class="btn-sec" onclick="clearStorage()">RESET</button>
        </div>
    </div>

    <script type="module">
        import init, { EmulatorState } from './pkg/pokegameboy.js';

        let emu, wasm_mem;

        async function setup() {
            try {
                const wasm = await init();
                wasm_mem = wasm.memory;
                const savedRom = localStorage.getItem('stored_rom');
                if (savedRom) startEmulator(new Uint8Array(JSON.parse(savedRom)));
            } catch (e) { console.error("WASM Init Failed", e); }
        }

        function startEmulator(bytes) {
            try {
                emu = new EmulatorState(bytes);
                const ctx = document.getElementById('screen').getContext('2d');
                
                // Auto-load SRAM if exists
                const savedSram = localStorage.getItem('sram_save');
                if (savedSram) emu.load_save_wasm(new Uint8Array(JSON.parse(savedSram)));

                function frame() {
                    emu.tick_frame();
                    const ptr = emu.framebuffer_ptr();
                    const pixels = new Uint8ClampedArray(wasm_mem.buffer, ptr, 160 * 144 * 4);
                    ctx.putImageData(new ImageData(pixels, 160, 144), 0, 0);
                    requestAnimationFrame(frame);
                }
                requestAnimationFrame(frame);
            } catch (e) { console.error("Emulator Crash", e); }
        }

        window.saveSnapshot = () => {
            if (!emu) return;
            const sram = emu.save_wasm();
            const blob = new Blob([sram], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'game_save.sav';
            a.click();
        };

        window.handleTouch = (key, isDown) => {
            if (isDown && window.navigator.vibrate) window.navigator.vibrate(10);
            // Input logic here...
        };

        document.getElementById('rom-upload').onchange = async (e) => {
            const file = e.target.files[0];
            const bytes = new Uint8Array(await file.arrayBuffer());
            localStorage.setItem('stored_rom', JSON.stringify(Array.from(bytes)));
            startEmulator(bytes);
        };

        document.getElementById('sav-upload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || !emu) return;
            const bytes = new Uint8Array(await file.arrayBuffer());
            emu.load_save_wasm(bytes);
        };

        window.clearStorage = () => { localStorage.clear(); location.reload(); };
        setup();
    </script>
</body>
</html>
