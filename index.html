<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦀 RUST Game Boy — LR35902</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --accent: #df6137;
            --btn-dark: #2c2c2e;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: var(--bg);
            color: var(--text-main); 
            display: flex;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        /* --- MAIN CONSOLE CARD --- */
        .console-card {
            background: var(--surface);
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            width: 95vw;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-meta {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .brand { font-weight: 900; font-size: 1.1rem; color: var(--accent); font-style: italic; }
        .live-label { font-family: 'JetBrains Mono'; font-size: 10px; font-weight: 800; color: var(--text-muted); letter-spacing: 2px; }

        /* --- SCREEN WITH INTEGRATED STATUS BAR --- */
        .display-container {
            width: 100%;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            margin-bottom: 35px;
        }

        /* Integrated Status Bar from your Screenshots */
        .hw-status {
            background: #222;
            padding: 8px 15px;
            display: flex;
            justify-content: center;
            gap: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: #777;
            border-bottom: 1px solid #333;
        }

        .hw-status span { color: #eee; }
        .running-tag { color: #4ade80 !important; font-weight: 800; }

        canvas { 
            width: 100%; 
            aspect-ratio: 160 / 144;
            image-rendering: pixelated; 
            display: block;
        }

        /* --- BUTTONS STYLE FROM SCREENSHOT --- */
        .controls-layout {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            margin-bottom: 35px;
        }

        .dpad { display: grid; grid-template-areas: ". u ." "l . r" ". d ."; gap: 10px; }
        .center-group { display: flex; flex-direction: column; gap: 8px; transform: translateY(10px); }
        .action-group { display: flex; gap: 15px; }

        .ctrl-btn {
            background: var(--btn-dark);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 6px 0 #000;
            transition: all 0.1s ease;
        }

        .sq { width: 48px; height: 48px; border-radius: 12px; font-size: 18px; }
        .round { width: 62px; height: 62px; border-radius: 50%; font-size: 22px; }
        .pill { width: 55px; height: 18px; border-radius: 20px; font-size: 7px; box-shadow: 0 3px 0 #000; }

        .ctrl-btn.active, .ctrl-btn:active {
            background: var(--accent);
            transform: translateY(3px);
            box-shadow: 0 2px 0 #000;
        }

        /* --- SYSTEM FOOTER --- */
        .footer-tools { display: flex; gap: 12px; width: 100%; justify-content: center; }
        
        .sys-btn {
            background: #1d1d1f; color: white; border: none;
            padding: 12px 20px; border-radius: 12px; font-weight: 700;
            font-size: 10px; font-family: 'JetBrains Mono'; cursor: pointer;
        }
        .btn-outline { background: white; color: #1d1d1f; border: 2px solid #e5e5e7; }

    </style>
</head>
<body>

    <div class="console-card">
        <div class="header-meta">
            <div class="brand">🦀 RUST Gameboy — LR35902 Runtime</div>

        </div>

        <div class="display-container">
            <div class="hw-status">
                <div>CPU: <span>----</span></div>
                <div>LY: <span>--</span></div>
                <div>IF: <span>--</span></div>
                <div class="running-tag">● RUNNING</div>
            </div>
            <canvas id="screen" width="160" height="144"></canvas>
        </div>

        <div class="controls-layout">
            <div class="dpad">
                <div id="key-arrowup" class="ctrl-btn sq" style="grid-area: u">↑</div>
                <div id="key-arrowleft" class="ctrl-btn sq" style="grid-area: l">←</div>
                <div id="key-arrowright" class="ctrl-btn sq" style="grid-area: r">→</div>
                <div id="key-arrowdown" class="ctrl-btn sq" style="grid-area: d">↓</div>
            </div>

            <div class="center-group">
                <div id="key-shift" class="ctrl-btn pill">SELECT</div>
                <div id="key-enter" class="ctrl-btn pill">START</div>
            </div>

            <div class="action-group">
                <div id="key-b" class="ctrl-btn round">B</div>
                <div id="key-a" class="ctrl-btn round">A</div>
            </div>
        </div>

        <div class="footer-tools">
            <input type="file" id="rom-upload" style="display:none" accept=".gb">
            <button class="sys-btn" onclick="document.getElementById('rom-upload').click()">LOAD ROM</button>
            <button class="sys-btn btn-outline" onclick="clearStorage()">RESET SYSTEM</button>
        </div>
    </div>

    <script type="module">
        import init, { EmulatorState } from './pkg/pokegameboy.js';

        let emu, wasm_mem;

        // Key Mapping (A to A, B to B)
        const keyMap = {
            'ArrowUp': 'arrowup', 'ArrowDown': 'arrowdown', 
            'ArrowLeft': 'arrowleft', 'ArrowRight': 'arrowright',
            'a': 'a', 'b': 'b', 'A': 'a', 'B': 'b',
            'Enter': 'enter', 'Shift': 'shift'
        };

        function updateInput(key, isPressed) {
            const id = keyMap[key];
            if (!id) return;
            const btn = document.getElementById(`key-${id.toLowerCase()}`);
            if (btn) isPressed ? btn.classList.add('active') : btn.classList.remove('active');
            // if (emu) emu.set_input(id, isPressed);
        }

        window.addEventListener('keydown', (e) => updateInput(e.key, true));
        window.addEventListener('keyup', (e) => updateInput(e.key, false));

        document.querySelectorAll('.ctrl-btn').forEach(btn => {
            const key = btn.id.replace('key-', '');
            btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); updateInput(key, true); if(window.navigator.vibrate) window.navigator.vibrate(5); };
            btn.onmouseup = btn.ontouchend = btn.onmouseleave = (e) => { e.preventDefault(); updateInput(key, false); };
        });

        async function setup() {
            try {
                const wasm = await init();
                wasm_mem = wasm.memory;
                const savedRom = localStorage.getItem('stored_rom');
                if (savedRom) startEmulator(new Uint8Array(JSON.parse(savedRom)));
            } catch (e) { console.error(e); }
        }

        function startEmulator(bytes) {
            emu = new EmulatorState(bytes);
            const ctx = document.getElementById('screen').getContext('2d');
            function frame() {
                emu.tick_frame();
                const ptr = emu.framebuffer_ptr();
                const pixels = new Uint8ClampedArray(wasm_mem.buffer, ptr, 160 * 144 * 4);
                ctx.putImageData(new ImageData(pixels, 160, 144), 0, 0);
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }

        document.getElementById('rom-upload').onchange = async (e) => {
            const file = e.target.files[0];
            const bytes = new Uint8Array(await file.arrayBuffer());
            localStorage.setItem('stored_rom', JSON.stringify(Array.from(bytes)));
            startEmulator(bytes);
        };

        window.clearStorage = () => { localStorage.clear(); location.reload(); };
        setup();
    </script>
</body>
</html>
